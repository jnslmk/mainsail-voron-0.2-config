[include mainsail.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_rp2040_454741505A843C9A-if00

[mcu EBBCan]
canbus_uuid: d403bb20746a

[include accelerometer.cfg]
[input_shaper]
shaper_freq_x: 86.2
shaper_type_x: ei
shaper_freq_y: 61.6
shaper_type_y: mzv

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor ebb36_temp]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100

[temperature_sensor btt_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: gpio27
min_temp: 0
max_temp: 100

[exclude_object]

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 11000  # measured 13100
max_z_velocity: 15
max_z_accel: 300
square_corner_velocity: 6.0

[stepper_x]
step_pin: gpio11
dir_pin: !gpio10
enable_pin: !gpio12
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 120
position_max: 120
homing_speed: 40  # for sensorless homing it is recommended not to go above 40mm/s   
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: gpio9
tx_pin: gpio8
diag_pin: ^gpio4
uart_address: 0
run_current: 0.7
interpolate: true

[autotune_tmc stepper_x]
motor: moons-ms14hs5p4150
sg4_thrs: 85

[stepper_y]
step_pin: gpio6
dir_pin: !gpio5
enable_pin: !gpio7
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 120
position_max: 120
homing_speed: 40  # for sensorless homing it is recommended not to go above 40mm/s   
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: gpio9
tx_pin: gpio8
diag_pin: ^gpio3
uart_address: 2
run_current: 0.7
interpolate: true

[autotune_tmc stepper_y]
motor: moons-ms14hs5p4150
sg4_thrs: 85

[stepper_z]
step_pin: gpio19
dir_pin: !gpio28
enable_pin: !gpio2
microsteps: 32
rotation_distance: 8
endstop_pin: ^gpio25
#position_endstop: 120
position_max: 120
position_min: -1.5
homing_speed: 20
second_homing_speed: 3.0
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: gpio9
tx_pin: gpio8
uart_address: 1
run_current: 0.45
interpolate: true

[autotune_tmc stepper_z]
motor: moons-le174s-t0808-200-ar3-s-065

[extruder]
step_pin: EBBCan:PD0
dir_pin: !EBBCan:PD1
enable_pin: !EBBCan:PD2
microsteps: 32
rotation_distance: 22.64  # See calibrating rotation_distance on extruders doc
gear_ratio: 50:10  # Sherpa Mini with 10T motor pinion = 5:1 reduction
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:PB13
# EBB36/42 v1.1 uses PA2 instead of PB13 for the heater MOSFET.
#heater_pin: EBBCan:PA2
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: EBBCan:PA3
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300
min_extrude_temp: 170

[tmc2209 extruder]
uart_pin: EBBCan:PA15
run_current: 0.7
interpolate: true

[autotune_tmc extruder]
motor: moons-cse14hra1l410a

[heater_bed]
heater_pin: gpio21
sensor_type: Generic 3950
sensor_pin: gpio26
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 120

[fan]
pin: EBBCan:PA0

[heater_fan heatbreak_cooling_fan]
pin: EBBCan:PA1
heater: extruder
heater_temp: 50.0

[heater_fan controller_fan]
pin: gpio20

[filament_switch_sensor filament_switch]
switch_pin: gpio29
pause_on_runout: true
runout_gcode: SFS_RUNOUT

#[filament_motion_sensor filament_motion]
# Deactivated because it produces incorrect runout readings / false triggers.
#switch_pin: gpio16
#extruder: extruder
#pause_on_runout: true
#detection_length: 2.88
#;detection_length: 5
#runout_gcode: SFS_RUNOUT

[idle_timeout]
timeout: 1800

[force_move]
enable_force_move: true

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
    SAVE_GCODE_STATE NAME=STATE_HOME_OVERRIDE

    # Home Z first, to avoid any situation where the nozzle might scrape the bed
    {% if home_all or 'Z' in params %}
        _HOME_Z
    {% endif %}

    {% if home_all or 'X' in params %}
        _HOME_X
    {% endif %}

    {% if home_all or 'Y' in params %}
        _HOME_Y
    {% endif %}
    
    # G90
    # G0 X60 Y60 Z20 F3600 # move to bed center
    RESTORE_GCODE_STATE NAME=STATE_HOME_OVERRIDE

[bed_screws]
screw1: 10,110
screw1_name: back left
screw2: 110,110
screw2_name: back right
screw3: 60,10
screw3_name: front center

#####################################################################
# Macros
#####################################################################
[gcode_macro PREHEAT]
description: Preheat & heat-soak using chamber sensor if present, else time-based
# Defaults (can be overridden from the slicer call)
variable_target_bed: 110
variable_target_hotend: 250
variable_target_hotend_standby: 150
variable_target_chamber: 35
variable_soak_minutes: 20
variable_chamber_wait_timeout_minutes: 30
variable_circulate_fan_speed: 0.35
# WAIT: AUTO / CHAMBER use a bounded chamber soak window when a sensor is present.
# TIME always uses the configured soak duration.
gcode:
    {% set preheat = printer["gcode_macro PREHEAT"] %}
    {% set bed      = params.BED|default(preheat.target_bed)|int %}
    {% set hotend   = params.EXTRUDER|default(preheat.target_hotend)|int %}
    {% set hotend_standby = params.STANDBY_EXTRUDER|default(preheat.target_hotend_standby)|int %}
    {% set chamber  = params.CHAMBER|default(preheat.target_chamber)|int %}
    {% set soak_min = params.SOAK_MIN|default(preheat.soak_minutes)|int %}
    {% set chamber_timeout_min = params.CHAMBER_TIMEOUT_MIN|default(preheat.chamber_wait_timeout_minutes)|int %}
    {% set waitmode = (params.WAIT|default("AUTO"))|upper %}
    {% set circulate = params.CIRCULATE|default(1)|int %}
    {% set fan_speed = params.FAN_SPEED|default(preheat.circulate_fan_speed)|float %}
    {% set have_chamber = 'temperature_sensor chamber' in printer.configfile.config %}
    {% set chamber_temp = printer["temperature_sensor chamber"].temperature|float if have_chamber else 0.0 %}
    {% set max_x = printer.toolhead.axis_maximum.x|float %}
    {% set max_y = printer.toolhead.axis_maximum.y|float %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set center_x = max_x / 2.0 %}
    {% set center_y = max_y / 2.0 %}
    {% set park_z = [30.0, max_z - 5.0]|min %}
    {% set fan_pwm = (fan_speed * 255.0)|int %}
    {% set hotend_standby = [hotend_standby, hotend]|min %}

    SET_DISPLAY_TEXT MSG="Preheat: bed {bed}C, nozzle {hotend}C, chamber {chamber}C"

    # Start heating the bed and bring the nozzle to a lower standby temp while soaking.
    M140 S{bed}
    M104 S{hotend_standby}

    {% if circulate %}
        {% if printer.toolhead.homed_axes != "xyz" %}
            SET_DISPLAY_TEXT MSG="Preheat: homing for circulation"
            G28
        {% endif %}
        G90
        G0 Z{park_z} F1800
        G0 X{center_x} Y{center_y} F12000
    {% endif %}

    {% if circulate and fan_speed > 0 %}
        SET_DISPLAY_TEXT MSG="Heatsoak: circulating air"
        M106 S{fan_pwm}
    {% endif %}

    # Always wait for bed (helps the chamber warm)
    M190 S{bed}

    {% if (waitmode in ["AUTO","CHAMBER"]) and have_chamber and chamber_temp >= chamber %}
        SET_DISPLAY_TEXT MSG="Heatsoak: chamber ready ({'%.1f' % chamber_temp}C)"
    {% elif (waitmode in ["AUTO","CHAMBER"]) and have_chamber %}
        SET_DISPLAY_TEXT MSG="Heatsoak: chamber soak {chamber_timeout_min} min max"
        G4 S{chamber_timeout_min * 60}
    {% elif waitmode in ["TIME"] or not have_chamber %}
        SET_DISPLAY_TEXT MSG="Heatsoak: {soak_min} min (no chamber sensor)"
        G4 S{soak_min*60}
    {% endif %}

    M107                           ; turn part-cooling fan off before final nozzle heat
    SET_DISPLAY_TEXT MSG="Preheat: final nozzle"
    M109 S{hotend}
    SET_DISPLAY_TEXT MSG="Preheat done"

[gcode_macro PREHEAT_ASA]
description: Convenience wrapper for ASA (110/250/35, 20 min soak if no chamber sensor)
gcode:
    PREHEAT BED={params.BED|default(110)} EXTRUDER={params.EXTRUDER|default(250)} CHAMBER={params.CHAMBER|default(35)} SOAK_MIN={params.SOAK_MIN|default(20)} WAIT={params.WAIT|default("AUTO")}

[gcode_macro PREHEAT_ABS]
description: Preheat for ABS (105/245/35C, 15min soak if no chamber sensor)
gcode:
    PREHEAT BED={params.BED|default(105)} EXTRUDER={params.EXTRUDER|default(245)} CHAMBER={params.CHAMBER|default(35)} SOAK_MIN={params.SOAK_MIN|default(15)} WAIT={params.WAIT|default("AUTO")}

[delayed_gcode DISABLEFILAMENTSENSOR] ; This will disable the SFS 1 second after klipper starts
initial_duration: 1
gcode:
  SET_FILAMENT_SENSOR SENSOR=filament_switch ENABLE=0

[gcode_macro BED_SCREW_ADJUST]
description: Start bed screw leveling assistant
gcode:
    BED_SCREWS_ADJUST

[gcode_macro SFS_ENABLE]
description: Enable smart filament sensor
gcode:
  SET_DISPLAY_TEXT MSG="Enabling the Smart Filament Sensor"
  G92 E0  # Reset extruder position to zero for clean sensor baseline
  G4 P2000  # Wait 2 seconds to give printer time for normal extrusion flow
  SET_FILAMENT_SENSOR SENSOR=filament_switch ENABLE=1

[gcode_macro SFS_DISABLE]
description: Disable smart filament sensor 
gcode:
  SET_DISPLAY_TEXT MSG="Disabling the Smart Filament Sensor"
  G92 E0  # Reset extruder position to zero for clean sensor baseline
  SET_FILAMENT_SENSOR SENSOR=filament_switch ENABLE=0

[gcode_macro SFS_RUNOUT]
gcode:
  ; no beeper installed on my machine
  ;M300 S660 P300  ; BEE
  ;M300 S440 P300  ; BOOP
  RESPOND TYPE=error MSG="Filament Runout"  ; Display a console message
  SET_DISPLAY_TEXT MSG="Filament Runout"  ; Display a message on the LCD

[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customize for your slicer of choice
gcode:
    # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set standby_extruder = [params.STANDBY_EXTRUDER|default(150)|int, target_extruder]|min %}
    {% set center_x = printer.toolhead.axis_maximum.x|float / 2.0 %}
    {% set center_y = printer.toolhead.axis_maximum.y|float / 2.0 %}
    {% set heat_z = 5.0 %}
    {% set fan_pwm = (255.0 * 0.35)|int %}
    
    M140 S{target_bed}     ; set bed temperature to e.g. 55 °C and continue
    M104 S{standby_extruder}   ; keep nozzle warm without fully soaking at print temp

    {% if printer.toolhead.homed_axes != "xyz" %}
        SET_DISPLAY_TEXT MSG="Homing"
        G28                        ; home all axes before moving to the heat position
    {% endif %}
    G90
    G0 X{center_x} Y{center_y} F12000
    G0 Z{heat_z} F1800             ; hold the bed close to the part fan during heating

    SET_DISPLAY_TEXT MSG="Heating"
    M106 S{fan_pwm}            ; circulate warm air across the bed while it heats
    M190 S{target_bed}     ; wait for bed temperature to reach e.g. 55 °C
    M107                           ; turn part-cooling fan off before final nozzle heat
    M109 S{target_extruder}   ; wait for hot end temperature to reach e.g. 210 °C

    SET_DISPLAY_TEXT MSG="Primeline"
    SAVE_GCODE_STATE NAME=STATE_PRINT_START
    G0 X2 Y2 F10000                ; Go to starting point
    G0 Z0.4                        ; Raise Z to 0.4
    G91                            ; Incremental positioning 
    G1 X118 E30 F1000              ; Primeline
    RESTORE_GCODE_STATE NAME=STATE_PRINT_START

    SET_DISPLAY_TEXT MSG="Printing"
    SFS_ENABLE                     ; enable the filament runout sensor(s)
   
[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customize for your slicer of choice
gcode:
    SFS_DISABLE                    ; disable the filament runout sensor(s)

    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                 ; retract filament
    G91                            ; relative positioning

    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    #   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600             ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000  ; move nozzle to remove stringing

    TURN_OFF_HEATERS
    M107                           ; turn off part-cooling fan
    G90                            ; absolute positioning
    G0 X60 Y{max_y-10} F3600          ; park nozzle at rear
    M18 ; disable steppers

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # Parameters
    {% set z = params.Z|default(10)|int %}                                                   ; z hop amount
    
    {% if printer['pause_resume'].is_paused|int == 0 %}     
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                              ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}    ; set hotend temp variable for reference in resume macro
                                
        SFS_DISABLE                                                                          ; disable filament sensor       
        SAVE_GCODE_STATE NAME=PAUSE                                                          ; save current print position for resume                
        BASE_PAUSE                                                                           ; pause print
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}       ; check that zhop doesn't exceed z max
            G91                                                                              ; relative positioning
            G1 Z{z} F900                                                                     ; raise Z up by z hop amount
        {% else %}
            { action_respond_info("Pause zhop exceeds maximum Z height.") }                  ; if z max is exceeded, show message and set zhop value for resume to 0
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        G90                                                                                  ; absolute positioning
        G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000   ; park toolhead at front center
        SAVE_GCODE_STATE NAME=PAUSEPARK                                                      ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error) 
        M104 S0                                                                              ; turn off hotend
        SET_IDLE_TIMEOUT TIMEOUT=43200                                                       ; set timeout to 12 hours
    {% endif %}

[gcode_macro RESUME]
# From https://github.com/AndrewEllis93/Print-Tuning-Guide/blob/040d31c6daaed23c2a1a353545e7ee442a232f32/articles/useful_macros.md
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
    # Parameters
    {% set e = params.E|default(2.5)|int %}
    
    {% if printer['pause_resume'].is_paused|int == 1 %}
        SFS_ENABLE                                                                   ; enable filament sensor
        #RESETRGB                                                                    ; reset LCD color
        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
        {% if etemp > 0 %}
            M109 S{etemp|int}                                                        ; wait for hotend to heat back up
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100                     ; go back to parked position in case toolhead was moved during pause (otherwise the return zhop can error)  
        G91                                                                          ; relative positioning
        M83                                                                          ; relative extruder positioning
        {% if printer[printer.toolhead.extruder].temperature >= printer.configfile.settings.extruder.min_extrude_temp %}                                                
            G1 Z{zhop * -1} E{e} F900                                                ; prime nozzle by E, lower Z back down
        {% else %}                      
            G1 Z{zhop * -1} F900                                                     ; lower Z back down without priming (just in case we are testing the macro with cold hotend)
        {% endif %}                             
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60                          ; restore position
        BASE_RESUME                                                                  ; resume print
    {% endif %}

[gcode_macro CANCEL_PRINT]
# From https://github.com/AndrewEllis93/Print-Tuning-Guide/blob/040d31c6daaed23c2a1a353545e7ee442a232f32/articles/useful_macros.md
rename_existing: BASE_CANCEL_PRINT
gcode:
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout} ; set timeout back to configured value
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    PRINT_END
    BASE_CANCEL_PRINT

[gcode_macro LOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E30 F300                    ; load
   G1 E15 F150                    ; prime nozzle with filament
   M82                            ; set extruder to absolute
    
[gcode_macro UNLOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E10 F300                    ; extrude a little to soften tip
   G1 E-40 F1800                  ; retract some, but not too much or it will jam
   M82                            ; set extruder to absolute

[gcode_macro DRY_EXTRUDE]
description: Cold extrude using force_move without changing min_extrude_temp
gcode:
   {% set length = params.LENGTH|default(100)|float %}
   {% set speed = params.SPEED|default(1.0)|float %}
   {% if speed <= 0 %}
      { action_raise_error("DRY_EXTRUDE requires SPEED > 0") }
   {% endif %}
   SET_STEPPER_ENABLE STEPPER=extruder ENABLE=1
   FORCE_MOVE STEPPER=extruder DISTANCE={length} VELOCITY={speed}

[gcode_macro _HOME_X]
gcode:
    # Always use consistent run_current on A/B steppers during sensorless homing
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT_RATIO = 0.7 %} # by default we are dropping the motor current during homing. you can adjust this value if you are having trouble with skipping while homing
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_Y}

    # Home
    G28 X
    # Move away
    G91
    G1 X-10 F1200
    
    # Wait just a second… (give StallGuard registers time to clear)
    G4 P1000
    G90
    # Set current during print
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Y]
gcode:
    # Set current for sensorless homing
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT_RATIO = 0.7 %} # by default we are dropping the motor current during homing. you can adjust this value if you are having trouble with skipping while homing
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_Y}

    # Home
    G28 Y
    # Move away
    G91
    G1 Y-10 F1200

    # Wait just a second… (give StallGuard registers time to clear)
    G4 P1000
    G90
    # Set current during print
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Z]
gcode:
    G90
    G28 Z
    G1 Z30

